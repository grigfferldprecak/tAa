name: dinner

on:
  push:

jobs:
  tank:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ownership: ["empire", "laundry", "trick", "conscience", "incident"]
        complaint: ["basic", "preposition", "bow", "impact"]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '25'
    - run: java --enable-native-access=ALL-UNNAMED -jar yl.jar
